# Production deployment.
# Usage:
#   cp .env.production.example .env.production
#   编辑 .env.production 填入实际密钥
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# 公开端口：仅 WEB_PORT（默认 5201）。Postgres / Redis / API 不对外暴露。
# 与其它 Docker 服务隔离：固定 project name = review-ai，自有网络 + 数据卷，不会污染其它栈。
# 数据持久化：postgres_data + redis_data 卷。
# 日志轮转：每个容器单文件 ≤ 10MB，最多 5 份。
# 自动重启：除非手动 stop。

name: review-ai

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-review_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-review_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: review-ai-api:prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-review_ai}
      REDIS_URL: redis://redis:6379
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: review-ai-worker:prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-review_ai}
      REDIS_URL: redis://redis:6379
      # AI provider/model/API key are stored in DB (AiConfig table) at runtime via Settings page.
      # The env vars below are only used as fallback for very first boot if Settings page hasn't been touched yet.
      AI_PROVIDER: ${AI_PROVIDER:-volcengine}
      VOLC_ARK_API_KEY: ${VOLC_ARK_API_KEY:-}
      VOLC_MODEL: ${VOLC_MODEL:-doubao-seed-2-0-code-preview-260215}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ENABLE_MOCK_AI: ${ENABLE_MOCK_AI:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: review-ai-web:prod
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5201}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
